<style>
  :root{
    --bg:#f7f4ee;
    --bg-deep:#efeae0;
    --surface:#fffdf8;
    --ink:#16140f;
    --ink-soft:#4a463d;
    --ink-mute:#8a8576;
    --line:#e3ddce;
    --line-soft:#ece7d9;
    --accent:#b8421d;
    --accent-soft:#f3d7c8;
    --good:#3f6b3a;
    --good-soft:#dde9d8;
    --warn:#a06a18;
    --warn-soft:#f4e3c4;
    --shadow: 0 1px 0 rgba(22,20,15,.04), 0 8px 24px -12px rgba(22,20,15,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Geist", system-ui, sans-serif;
    background:var(--bg);
    color:var(--ink);
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}

  /* Header */
  header.top{
    border-bottom:1px solid var(--line);
    background:var(--bg);
    position:sticky; top:0; z-index:50;
    backdrop-filter:saturate(140%) blur(8px);
    background:color-mix(in srgb, var(--bg) 88%, transparent);
  }
  .top-inner{
    max-width:1320px; margin:0 auto;
    padding:18px 28px 14px;
    display:flex; align-items:flex-end; gap:32px; flex-wrap:wrap;
  }
  .brand{
    font-family:"Fraunces", serif;
    font-weight:600;
    font-size:30px;
    line-height:1;
    letter-spacing:-0.02em;
  }
  .brand em{
    font-style:italic; font-weight:400;
    color:var(--accent);
  }
  .meta{
    display:flex; gap:22px; flex-wrap:wrap;
    margin-left:auto;
    font-family:"Geist Mono", monospace;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-mute);
  }
  .meta strong{
    color:var(--ink);
    font-weight:500;
    font-size:13px;
    letter-spacing:0.02em;
    display:block;
    margin-top:2px;
    text-transform:none;
  }
  .meta strong .num{
    font-family:"Fraunces", serif;
    font-weight:600;
    font-size:22px;
    margin-right:4px;
  }

  /* Filters */
  .filters{
    max-width:1320px; margin:0 auto;
    padding:18px 28px 8px;
    display:grid;
    gap:14px;
  }
  .filter-row{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  }
  .search{
    flex:1; min-width:280px;
    position:relative;
  }
  .search input{
    width:100%;
    border:1px solid var(--line);
    background:var(--surface);
    border-radius:999px;
    padding:13px 18px 13px 44px;
    font:inherit; color:var(--ink);
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .search input:focus{
    border-color:var(--ink);
    box-shadow:0 0 0 4px color-mix(in srgb, var(--ink) 8%, transparent);
  }
  .search svg{
    position:absolute; left:16px; top:50%; transform:translateY(-50%);
    width:18px; height:18px; color:var(--ink-mute);
  }
  .chip{
    appearance:none;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink-soft);
    border-radius:999px;
    padding:9px 14px;
    font:inherit; font-size:13px; font-weight:500;
    cursor:pointer;
    transition:all .15s;
    display:inline-flex; align-items:center; gap:6px;
    white-space:nowrap;
  }
  .chip:hover{ border-color:var(--ink-mute); color:var(--ink) }
  .chip.active{
    background:var(--ink); color:var(--bg);
    border-color:var(--ink);
  }
  .chip .count{
    font-family:"Geist Mono", monospace;
    font-size:11px;
    opacity:.6;
  }
  .chip-group-label{
    font-family:"Geist Mono", monospace;
    font-size:10.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--ink-mute);
    margin-right:4px;
  }
  select.chip{
    padding-right:32px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%238a8576' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
    background-repeat:no-repeat;
    background-position:right 12px center;
  }

  /* Result bar */
  .resultbar{
    max-width:1320px; margin:0 auto;
    padding:6px 28px 18px;
    display:flex; align-items:baseline; gap:16px;
    border-bottom:1px solid var(--line-soft);
    flex-wrap:wrap;
  }
  .count-result{
    font-family:"Fraunces", serif;
    font-size:18px; font-weight:600;
  }
  .count-result em{
    font-style:italic; font-weight:400;
    color:var(--ink-mute);
  }
  .reset{
    background:none; border:none; cursor:pointer;
    color:var(--accent); font:inherit; font-size:13px;
    text-decoration:underline; text-underline-offset:3px;
    padding:0;
  }
  .reset:hover{ color:var(--ink) }

  /* Grid */
  .grid{
    max-width:1320px; margin:0 auto;
    padding:24px 28px 80px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));
    gap:14px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 20px 16px;
    display:flex; flex-direction:column;
    transition:border-color .15s, transform .15s, box-shadow .15s;
  }
  .card:hover{
    border-color:var(--ink-mute);
    transform:translateY(-1px);
    box-shadow:var(--shadow);
  }
  .card-head{
    display:flex; gap:10px; align-items:flex-start;
    margin-bottom:10px;
  }
  .card-head .name{
    font-family:"Fraunces", serif;
    font-size:18px; font-weight:600;
    line-height:1.2;
    letter-spacing:-0.01em;
    flex:1;
  }
  .badge{
    font-family:"Geist Mono", monospace;
    font-size:10px;
    font-weight:500;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:4px 8px;
    border-radius:6px;
    white-space:nowrap;
  }
  .badge.pourvue{ background:var(--good-soft); color:var(--good) }
  .badge.apourvoir{ background:var(--accent-soft); color:var(--accent) }
  .badge.other{ background:var(--bg-deep); color:var(--ink-mute) }

  .offer{
    color:var(--ink-soft);
    font-size:14px;
    margin-bottom:12px;
    font-weight:500;
  }
  .formation{
    font-size:12.5px;
    color:var(--ink-mute);
    line-height:1.4;
    border-left:2px solid var(--accent);
    padding:2px 0 2px 10px;
    margin-bottom:14px;
  }
  .formation .campus-tag{
    font-family:"Geist Mono", monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--accent);
    font-weight:500;
    display:block;
    margin-bottom:1px;
  }

  .meta-row{
    display:flex; gap:18px; flex-wrap:wrap;
    font-family:"Geist Mono", monospace;
    font-size:11.5px;
    color:var(--ink-mute);
    margin-bottom:14px;
    padding-bottom:14px;
    border-bottom:1px dashed var(--line);
  }
  .meta-row span{ display:inline-flex; align-items:center; gap:5px }
  .meta-row b{ color:var(--ink); font-weight:500 }

  .contact{
    margin-top:auto;
    display:grid; gap:5px;
    font-size:13px;
  }
  .contact .who{
    font-weight:500; color:var(--ink);
    margin-bottom:1px;
  }
  .contact .who .role{
    font-weight:400; color:var(--ink-mute); font-size:12px;
  }
  .contact a, .contact .nocontact{
    display:inline-flex; align-items:center; gap:6px;
    color:var(--ink-soft); text-decoration:none;
    font-size:12.5px;
  }
  .contact a:hover{ color:var(--accent); text-decoration:underline; text-underline-offset:2px }
  .contact .ico{
    width:13px; height:13px; flex-shrink:0; color:var(--ink-mute);
  }
  .nocontact{ color:var(--ink-mute); font-style:italic }

  .empty{
    grid-column:1/-1;
    text-align:center;
    padding:80px 20px;
    color:var(--ink-mute);
  }
  .empty h3{
    font-family:"Fraunces", serif;
    font-style:italic;
    font-weight:400;
    font-size:24px;
    color:var(--ink);
    margin:0 0 8px;
  }

  footer{
    border-top:1px solid var(--line);
    padding:22px 28px;
    max-width:1320px; margin:0 auto;
    color:var(--ink-mute);
    font-size:12px;
    font-family:"Geist Mono", monospace;
    display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap;
  }

  @media (max-width:680px){
    .top-inner{ padding:14px 18px 12px; gap:14px }
    .brand{ font-size:24px }
    .meta{ width:100%; margin-left:0; gap:14px }
    .filters{ padding:14px 18px 6px }
    .resultbar{ padding:6px 18px 14px }
    .grid{ padding:18px 18px 60px; grid-template-columns:1fr }
  }
</style>
</head>

    if(!iso) return '—';
    const [y,m] = iso.split('-');
    const months = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
    return months[parseInt(m,10)-1] + ' ' + y;
  };
  const fmtDate = s => s || '—';
  const phoneClean = s => (s||'').replace(/[^0-9+]/g,'');

  // Extract campus from formation string (CAMPUS X - ...)
  const campusOf = m => {
    if(!m.formation) return '';
    const match = m.formation.match(/^CAMPUS\s+([A-ZÉÈÊÀÂÎÏÔÛÇ\-]+)\s*-/i);
    return match ? match[1].trim() : 'AUTRE';
  };

  // Pre-compute fields
  DATA.forEach(m => {
    m._campus = campusOf(m);
    m._month = m.date_iso ? m.date_iso.slice(0,7) : '';
    m._search = norm([
      m.raison_sociale, m.intitule, m.formation, m.ville, m.code_postal,
      m.contact_nom, m.contact_mail, m.gest_offre, m.gest_entreprise
    ].join(' '));
  });

  // Build filter options
  const campusList = [...new Set(DATA.map(m => m._campus).filter(Boolean))].sort();
  const monthList = [...new Set(DATA.map(m => m._month).filter(Boolean))].sort();
  const statusList = ['à pourvoir', 'pourvue'];

  const state = {
    q: '',
    campus: new Set(),
    status: new Set(),
    month: new Set(),
    sort: 'date'
  };

  // Render filter chips
  const buildChips = (rowId, items, key, labelFn) => {
    const row = document.getElementById(rowId);
    items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.dataset.value = item;
      const count = DATA.filter(m => m[key === 'campus' ? '_campus' : key === 'status' ? 'statut' : '_month'] === item).length;
      btn.innerHTML = `${labelFn(item)} <span class="count">${count}</span>`;
      btn.addEventListener('click', () => {
        if(state[key].has(item)) state[key].delete(item); else state[key].add(item);
        btn.classList.toggle('active');
        render();
      });
      row.appendChild(btn);
    });
  };
  buildChips('campus-row', campusList, 'campus', x => x);
  buildChips('status-row', statusList, 'status', x => x);
  buildChips('month-row', monthList, 'month', monthLabel);

  // Search & sort listeners
  document.getElementById('q').addEventListener('input', e => {
    state.q = norm(e.target.value);
    render();
  });
  document.getElementById('sort').addEventListener('change', e => {
    state.sort = e.target.value;
    render();
  });
  document.getElementById('reset').addEventListener('click', () => {
    state.q = ''; state.campus.clear(); state.status.clear(); state.month.clear();
    state.sort = 'date';
    document.getElementById('q').value = '';
    document.getElementById('sort').value = 'date';
    document.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active'));
    render();
  });

  // Filtering
  const applyFilters = () => {
    return DATA.filter(m => {
      if(state.q && !m._search.includes(state.q)) return false;
      if(state.campus.size && !state.campus.has(m._campus)) return false;
      if(state.status.size && !state.status.has(m.statut)) return false;
      if(state.month.size && !state.month.has(m._month)) return false;
      return true;
    });
  };
  const applySort = arr => {
    const c = [...arr];
    if(state.sort === 'date') c.sort((a,b) => (a.date_iso||'').localeCompare(b.date_iso||'') || a.raison_sociale.localeCompare(b.raison_sociale));
    else if(state.sort === 'date_desc') c.sort((a,b) => (b.date_iso||'').localeCompare(a.date_iso||'') || a.raison_sociale.localeCompare(b.raison_sociale));
    else if(state.sort === 'name') c.sort((a,b) => a.raison_sociale.localeCompare(b.raison_sociale));
    else if(state.sort === 'restants') c.sort((a,b) => b.restants - a.restants || a.raison_sociale.localeCompare(b.raison_sociale));
    return c;
  };

  // Card template
  const card = m => {
    const statusClass = m.statut === 'pourvue' ? 'pourvue'
      : m.statut === 'à pourvoir' ? 'apourvoir' : 'other';
    const formationClean = m.formation ? m.formation.replace(/^CAMPUS\s+[^-]+-\s*/i, '').trim() : '';

    const contactLines = [];
    if(m.contact_nom){
      contactLines.push(`<div class="who">${escapeHtml(m.contact_nom)}${m.contact_fonction ? ` <span class="role">· ${escapeHtml(m.contact_fonction)}</span>` : ''}</div>`);
    }
    if(m.contact_mail){
      contactLines.push(`<a href="mailto:${escapeHtml(m.contact_mail)}"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>${escapeHtml(m.contact_mail)}</a>`);
    }
    if(m.contact_tel){
      contactLines.push(`<a href="tel:${phoneClean(m.contact_tel)}"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/></svg>Fixe : ${escapeHtml(m.contact_tel)}</a>`);
    }
    if(m.contact_mobile){
      contactLines.push(`<a href="tel:${phoneClean(m.contact_mobile)}"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>Mobile : ${escapeHtml(m.contact_mobile)}</a>`);
    }
    if(!contactLines.length){
      contactLines.push(`<span class="nocontact">Aucun contact renseigné</span>`);
    }

    return `<article class="card">
      <div class="card-head">
        <div class="name">${escapeHtml(m.raison_sociale)}</div>
        <span class="badge ${statusClass}">${escapeHtml(m.statut || '—')}</span>
      </div>
      ${m.intitule ? `<div class="offer">${escapeHtml(m.intitule)}</div>` : ''}
      ${formationClean ? `<div class="formation">
        ${m._campus ? `<span class="campus-tag">${escapeHtml(m._campus)}</span>` : ''}
        ${escapeHtml(formationClean)}
      </div>` : ''}
      <div class="meta-row">
        <span>📅 <b>${escapeHtml(fmtDate(m.date_debut))}</b></span>
        <span>📍 <b>${escapeHtml(m.code_postal)} ${escapeHtml(m.ville)}</b></span>
        <span>👥 <b>${m.restants}</b>/${m.postes} restants</span>
      </div>
      <div class="contact">
        ${contactLines.join('')}
        ${m.gest_offre && m.gest_offre !== 'Aucun gestionnaire' ? `<div style="margin-top:6px;font-size:11.5px;color:var(--ink-mute);font-family:'Geist Mono',monospace">Gestionnaire : ${escapeHtml(m.gest_offre)}</div>` : ''}
      </div>
    </article>`;
  };

  function escapeHtml(s){
    return (s||'').toString()
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // Render
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  function render(){
    const list = applySort(applyFilters());
    countEl.textContent = list.length;
    if(!list.length){
      grid.innerHTML = `<div class="empty"><h3>Aucune mission ne correspond.</h3>Essayez d'élargir les filtres ou de modifier la recherche.</div>`;
      return;
    }
    grid.innerHTML = list.map(card).join('');
  }
  render();
})();
</script>
</body>
</html>
